name: SAMBA Train and Predict

on:
  schedule:
    - cron: "30 22 * * 1-5"   # Monday–Friday at 22:30 UTC
  workflow_dispatch:
    inputs:
      option:
        description: "Option to run (A, B, or both)"
        required: false
        default: "both"

jobs:
  train_a:
    name: Train Option A
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: github.event.inputs.option == 'both' || github.event.inputs.option == 'A' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train fixed split for Option A
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: python train.py --option A
      - name: Train shrinking windows for Option A
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: python train_windows.py --option A
      - name: Upload models to Hugging Face
        env:
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}
          HF_MODELS_REPO: ${{ secrets.HF_MODELS_REPO }}
        run: python upload_models.py

  train_b:
    name: Train Option B
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: github.event.inputs.option == 'both' || github.event.inputs.option == 'B' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train fixed split for Option B
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: python train.py --option B
      - name: Train shrinking windows for Option B
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: python train_windows.py --option B
      - name: Upload models to Hugging Face
        env:
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}
          HF_MODELS_REPO: ${{ secrets.HF_MODELS_REPO }}
        run: python upload_models.py

  predict_and_upload:
    name: Generate signals and upload
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [train_a, train_b]
    if: always() && !cancelled() && needs.train_a.result == 'success' && needs.train_b.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate signals for both options
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: python predict.py --option both
      - name: Upload signals to Hugging Face
        env:
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}
          HF_MODELS_REPO: ${{ secrets.HF_MODELS_REPO }}
        run: python upload_models.py
      - name: Done
        run: echo "SAMBA pipeline complete."
